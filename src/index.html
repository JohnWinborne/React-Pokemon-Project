<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>John Winborne</title>
    <link rel="stylesheet" href="style.css" />
    <!-- font awesome to use the spinner -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  </head>

  <body>
    <!-- HEADER / NAV  -->
    <header id="home" class="site-header">
      <div class="container header-inner">
        <div>
          <span class="logo__text">Pokémon</span>
        </div>
        <nav class="main__nav">
          <a href="#home" class="btn">Home</a>
          <a href="#contact" class="btn">Contact</a>
        </nav>
      </div>
    </header>

    <!--  Pokémon SEARCH  -->
    <section class="pokemon">
      <div class="container pokemon__content">
        <h1>Browse Pokémon</h1>
        <form id="search__form" class="search__bar">
          <input id="search__input" type="text" placeholder="Search by name" />
        </form>
      </div>
    </section>

    <!-- FILTERS -->
    <main class="container main__content">
      <section class="results__header">
        <h2>Search results:</h2>

        <div class="filters">
          <div class="filter__group">
            <label for="type__filter">Type:</label>
            <select id="type__filter" name="type">
              <option value="">All types</option>
              <option value="Normal">Normal</option>
              <option value="Fire">Fire</option>
              <option value="Water">Water</option>
              <option value="Grass">Grass</option>
              <option value="Electric">Electric</option>
              <option value="Ice">Ice</option>
              <option value="Fighting">Fighting</option>
              <option value="Poison">Poison</option>
              <option value="Ground">Ground</option>
              <option value="Flying">Flying</option>
              <option value="Psychic">Psychic</option>
              <option value="Bug">Bug</option>
              <option value="Rock">Rock</option>
              <option value="Ghost">Ghost</option>
              <option value="Dragon">Dragon</option>
              <option value="Dark">Dark</option>
              <option value="Steel">Steel</option>
              <option value="Fairy">Fairy</option>
            </select>
          </div>

          <!-- GENERATION FILTER -->
          <div class="filter__group">
            <div class="filter__label--row">
              <span>Generation range:</span>
              <span id="generation__range--label">1 to 9</span>
            </div>
            <!-- Add Javascript for slider and type-->
            <div class="generation__sliders">
              <div>
                <input
                  class="gen__min"
                  type="range"
                  min="1"
                  max="9"
                  value="1"
                />
                <p>min</p>
              </div>
              <div>
                <input
                  class="gen__max"
                  type="range"
                  min="1"
                  max="9"
                  value="9"
                />
                <p>max</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- POKEMON -->
      <section id="results">
        <div id="pokemonResults" class="pokemon__results pokemon__loading">
          <i class="fas fa-spinner pokemon__loading--spinner"></i>
        </div>
      </section>
    </main>
  </body>
  <script src="index.js"></script>
</html>
